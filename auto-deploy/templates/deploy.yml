name: "Auto Deploy"

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ==================== Job 1: 构建并部署到 WebDAV ====================
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ⚠️ 关键：设置 base path 为 /{项目名}/
      # 根据构建工具选择对应的环境变量：
      #   Vite 项目: VITE_BASE=/{项目名}/
      #   Vue CLI:   VUE_APP_BASE=/{项目名}/
      #   Nuxt:      NUXT_APP_BASE_PATH=/{项目名}/
      #   Next.js:   NEXT_PUBLIC_BASE_PATH=/{项目名}/
      #   通用:      BASE_URL=/{项目名}/
      - name: Build the project
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      # ---------- 部署到 WebDAV (版本目录) ----------
      - name: Upload to WebDAV (version)
        uses: weijia/action-upload-webdav@master
        with:
          webdav-url: ${{ secrets.WEBDAV_URL }}
          webdav-username: ${{ secrets.WEBDAV_USERNAME }}
          webdav-password: ${{ secrets.WEBDAV_PASSWORD }}
          webdav-root: online/${{ github.event.repository.name }}
          source-directory: ./dist

      # ---------- 清空并部署到 WebDAV (latest 目录) ----------
      - name: Clear WebDAV latest directory
        run: |
          echo "Clearing latest directory..."
          curl -X DELETE \
            -u "${{ secrets.WEBDAV_USERNAME }}:${{ secrets.WEBDAV_PASSWORD }}" \
            "${{ secrets.WEBDAV_URL }}online/${{ github.event.repository.name }}/latest/" \
            2>/dev/null || true
          echo "Latest directory cleared (or did not exist)"

      - name: Upload to WebDAV (latest)
        uses: weijia/action-upload-webdav@master
        with:
          webdav-url: ${{ secrets.WEBDAV_URL }}
          webdav-username: ${{ secrets.WEBDAV_USERNAME }}
          webdav-password: ${{ secrets.WEBDAV_PASSWORD }}
          webdav-root: online/${{ github.event.repository.name }}/latest
          source-directory: ./dist

      # ---------- 部署到 GitHub Pages ----------
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ==================== Job 2: GitHub Pages 发布 ====================
  deploy-pages:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
