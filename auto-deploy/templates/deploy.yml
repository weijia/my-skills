name: "Auto Deploy"

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ==================== Job 1: 构建并部署到 WebDAV ====================
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ⚠️ 关键：使用相对路径，确保部署在任意子目录下都能正常工作
      # 在 vite.config.ts 中设置 base: './'，无需通过环境变量传入
      # 其他构建工具也建议使用相对路径配置：
      #   Vite:     base: './'  (vite.config.ts)
      #   Vue CLI:  publicPath: './'  (vue.config.js)
      #   Nuxt:     base: './'  (nuxt.config.ts)
      #   Next.js:  basePath: undefined, 使用相对路径输出
      - name: Build the project
        run: npm run build

      # ---------- 部署到 WebDAV (版本目录 + latest) ----------
      - name: Upload to WebDAV
        uses: weijia/action-upload-webdav@v1.2.0
        with:
          webdav-url: ${{ secrets.WEBDAV_URL }}
          webdav-username: ${{ secrets.WEBDAV_USERNAME }}
          webdav-password: ${{ secrets.WEBDAV_PASSWORD }}
          webdav-root: online/${{ github.event.repository.name }}
          source-directory: ./dist
          copy-to-latest: 'true'

      # ---------- 部署到 GitHub Pages ----------
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ==================== Job 2: GitHub Pages 发布 ====================
  deploy-pages:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
