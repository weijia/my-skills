name: Build All Platforms

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  workflow_dispatch:
    inputs:
      platforms:
        description: '选择要构建的平台（多选用逗号分隔）'
        required: false
        default: 'android,ios,macos,linux,windows'
        type: string
      flutter_version:
        description: 'Flutter 版本（留空使用默认 3.35.6）'
        required: false
        default: ''
        type: string

env:
  FLUTTER_VERSION: ${{ inputs.flutter_version || '3.35.6' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-version:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_number: ${{ steps.version.outputs.version_number }}
      build_type: ${{ steps.version.outputs.build_type }}
      build_tag: ${{ steps.version.outputs.build_tag }}
      build_datetime: ${{ steps.version.outputs.build_datetime }}
      build_timezone: ${{ steps.version.outputs.build_timezone }}
      dart_defines: ${{ steps.version.outputs.dart_defines }}
      selected_platforms: ${{ steps.platforms.outputs.selected }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine Platforms
        id: platforms
        run: |
          PLATFORMS="${{ inputs.platforms || 'android,ios,macos,linux,windows' }}"
          echo "selected=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "Selected platforms: $PLATFORMS"

      - name: Generate Version
        id: version
        run: |
          chmod +x scripts/generate_version.sh
          source <(sed 's/^echo /export /g' scripts/generate_version.sh)

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_number=$VERSION_NUMBER" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "build_tag=$BUILD_TAG" >> $GITHUB_OUTPUT
          echo "build_datetime=$BUILD_DATETIME" >> $GITHUB_OUTPUT
          echo "build_timezone=$BUILD_TIMEZONE" >> $GITHUB_OUTPUT

          DART_DEFINES="--dart-define=VERSION_NAME=$VERSION_NAME"
          DART_DEFINES="$DART_DEFINES --dart-define=VERSION_TYPE=$BUILD_TYPE"
          DART_DEFINES="$DART_DEFINES --dart-define=VERSION_TAG=$BUILD_TAG"
          DART_DEFINES="$DART_DEFINES --dart-define=VERSION_DATETIME=$BUILD_DATETIME"
          DART_DEFINES="$DART_DEFINES --dart-define=VERSION_TIMEZONE=$BUILD_TIMEZONE"

          echo "$DART_DEFINES" > /tmp/dart_defines.txt
          echo "dart_defines<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/dart_defines.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Print Version Info
        run: |
          echo "==============================="
          echo "  Version:       ${{ steps.version.outputs.version_name }}"
          echo "  Build Number:  ${{ steps.version.outputs.version_number }}"
          echo "  Build Type:    ${{ steps.version.outputs.build_type }}"
          echo "  Tag:           ${{ steps.version.outputs.build_tag || 'None (auto-generated)' }}"
          echo "  DateTime:      ${{ steps.version.outputs.build_datetime || 'N/A' }}"
          echo "  Timezone:      ${{ steps.version.outputs.build_timezone || 'N/A' }}"
          echo "  Commit:        ${{ github.sha }}"
          echo "==============================="

  # ==================== Android ====================
  build-android:
    needs: generate-version
    runs-on: ubuntu-latest
    if: contains(needs.generate-version.outputs.selected_platforms, 'android')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Release Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Setting up release keystore..."
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-key.jks
            echo "Release keystore created"
          else
            echo "No keystore provided, will use debug signing"
          fi

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_BASE64 != '' && 'release-key.jks' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --build-name=${{ needs.generate-version.outputs.version_name }} \
            --build-number=${{ needs.generate-version.outputs.version_number }} \
            ${{ needs.generate-version.outputs.dart_defines }}

      - name: Build App Bundle
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_BASE64 != '' && 'release-key.jks' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name=${{ needs.generate-version.outputs.version_name }} \
            --build-number=${{ needs.generate-version.outputs.version_number }} \
            ${{ needs.generate-version.outputs.dart_defines }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ needs.generate-version.outputs.version_name }}
          path: build/app/outputs/flutter-apk/*.apk

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ needs.generate-version.outputs.version_name }}
          path: build/app/outputs/bundle/release/*.aab

      # ===== SFTP 上传（按需启用）=====
      # 取消下面的注释即可启用 SFTP 上传
      # - name: Upload APK to SFTP
      #   uses: weijia/action-upload-sftp@master
      #   with:
      #     sftp-host: ${{ secrets.SFTP_HOST }}
      #     sftp-port: ${{ secrets.SFTP_PORT }}
      #     sftp-username: ${{ secrets.SFTP_USERNAME }}
      #     sftp-password: ${{ secrets.SFTP_PASSWORD }}
      #     source-path: build/app/outputs/flutter-apk/app-release.apk
      #     remote-path: /home/github/apps/【项目名】/app-release-${{ needs.generate-version.outputs.version_name }}.apk
      #     cleanup-old-files: 'true'
      #     max-keep-files: '5'

  # ==================== iOS ====================
  build-ios:
    needs: generate-version
    runs-on: macos-latest
    if: contains(needs.generate-version.outputs.selected_platforms, 'ios')
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ needs.generate-version.outputs.version_name }} \
            --build-number=${{ needs.generate-version.outputs.version_number }} \
            ${{ needs.generate-version.outputs.dart_defines }}

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ needs.generate-version.outputs.version_name }}
          path: build/ios/iphoneos/

  # ==================== macOS ====================
  build-macos:
    needs: generate-version
    runs-on: macos-latest
    if: contains(needs.generate-version.outputs.selected_platforms, 'macos')
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: |
          flutter build macos --release \
            --build-name=${{ needs.generate-version.outputs.version_name }} \
            --build-number=${{ needs.generate-version.outputs.version_number }} \
            ${{ needs.generate-version.outputs.dart_defines }}

      - name: Create ZIP
        run: |
          cd build/macos/Build/Products/Release
          zip -r -9 【项目名】-macos.zip 【项目名】.app

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ needs.generate-version.outputs.version_name }}
          path: build/macos/Build/Products/Release/【项目名】-macos.zip

  # ==================== Linux ====================
  build-linux:
    needs: generate-version
    runs-on: ubuntu-latest
    if: contains(needs.generate-version.outputs.selected_platforms, 'linux')
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libssl-dev libpcre3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        run: |
          flutter build linux --release \
            --build-name=${{ needs.generate-version.outputs.version_name }} \
            --build-number=${{ needs.generate-version.outputs.version_number }} \
            ${{ needs.generate-version.outputs.dart_defines }}

      - name: Create TAR
        run: |
          mkdir -p /tmp/linux-bundle
          cp -r build/linux/x64/release/bundle/* /tmp/linux-bundle/
          cd /tmp/linux-bundle
          tar czf $GITHUB_WORKSPACE/【项目名】-linux-x64.tar.gz .

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-${{ needs.generate-version.outputs.version_name }}
          path: 【项目名】-linux-x64.tar.gz

  # ==================== Windows ====================
  build-windows:
    needs: generate-version
    runs-on: windows-latest
    if: contains(needs.generate-version.outputs.selected_platforms, 'windows')
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        shell: bash
        run: |
          flutter build windows --release \
            --build-name=${{ needs.generate-version.outputs.version_name }} \
            --build-number=${{ needs.generate-version.outputs.version_number }} \
            ${{ needs.generate-version.outputs.dart_defines }}

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "【项目名】-windows-x64.zip"

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-${{ needs.generate-version.outputs.version_name }}
          path: 【项目名】-windows-x64.zip

  # ==================== Release Summary ====================
  build-summary:
    needs:
      - generate-version
      - build-android
      - build-ios
      - build-macos
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "========================================"
          echo "  【项目名】 - Build Summary"
          echo "========================================"
          echo "  Version:       ${{ needs.generate-version.outputs.version_name }}"
          echo "  Build Number:  ${{ needs.generate-version.outputs.version_number }}"
          echo "  Build Type:    ${{ needs.generate-version.outputs.build_type }}"
          echo "  Tag:           ${{ needs.generate-version.outputs.build_tag || 'None (auto-generated)' }}"
          echo "  DateTime:      ${{ needs.generate-version.outputs.build_datetime || 'N/A' }}"
          echo "  Timezone:      ${{ needs.generate-version.outputs.build_timezone || 'N/A' }}"
          echo "  Commit:        ${{ github.sha }}"
          echo "  Branch:        ${{ github.ref_name }}"
          echo "========================================"
          echo ""
          echo "  Platform Builds:"
          echo "    Android:  ${{ needs.build-android.result }}"
          echo "    iOS:      ${{ needs.build-ios.result }}"
          echo "    macOS:    ${{ needs.build-macos.result }}"
          echo "    Linux:    ${{ needs.build-linux.result }}"
          echo "    Windows:  ${{ needs.build-windows.result }}"
          echo "========================================"
