name: "Build and Upload to SFTP"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ⚠️ 根据项目类型修改构建步骤
      # ========== Flutter Android 示例 ==========
      # - name: Setup Flutter
      #   uses: subosito/flutter-action@v2
      #   with:
      #     flutter-version: '3.x'
      #
      # - name: Build APK
      #   run: flutter build apk --release

      # ========== Node.js 示例 ==========
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # ---------- 上传到 SFTP ----------
      - name: Upload to SFTP
        uses: weijia/action-upload-sftp@master
        with:
          sftp-host: ${{ secrets.SFTP_HOST }}
          sftp-port: ${{ secrets.SFTP_PORT }}
          sftp-username: ${{ secrets.SFTP_USERNAME }}
          # 密码认证（二选一）
          sftp-password: ${{ secrets.SFTP_PASSWORD }}
          # 或 SSH 私钥认证（二选一，推荐）
          # sftp-private-key: ${{ secrets.SFTP_PRIVATE_KEY }}
          source-path: ./build/outputs/my-app.apk
          remote-path: /var/www/apps/my-app/my-app.apk
          cleanup-old-files: 'true'
          max-keep-files: 5
